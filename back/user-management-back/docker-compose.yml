services:
  mysql:
    image: mysql:8.4
    container_name: user-management-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: user_management_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: user-management-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_management_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
      SERVER_PORT: 8080
      APP_SECURITY_USERNAME: admin
      APP_SECURITY_PASSWORD: password
    ports:
      - "8080:8080"

volumes:
  mysql_data:
